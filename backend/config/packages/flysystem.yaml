# Documentation: https://github.com/thephpleague/flysystem-bundle/blob/master/docs/1-getting-started.md
services:
  scaleway_s3_client:
    class: 'Aws\S3\S3Client'
    arguments:
      - endpoint: '%env(resolve:S3_HOST)%'
        credentials:
          key: '%env(resolve:S3_ACCESS_KEY_ID)%'
          secret: '%env(resolve:S3_ACCESS_KEY_SECRET)%'
        region: '%env(resolve:S3_REGION)%'
        http:
          connect_timeout: 2
          timeout: 5

flysystem:
  storages:
    default.storage:
      adapter: 'aws'
      options:
        client: 'scaleway_s3_client'
        bucket: '%env(resolve:S3_BUCKET)%'
        streamReads: true

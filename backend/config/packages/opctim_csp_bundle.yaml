opctim_csp_bundle:
  # See https://github.com/opctim/symfony-csp-bundle?tab=readme-ov-file#the-always_add-option
  always_add: [ ]

  directives:
    default-src: &default-src
      - "'self'"
      - 'data:'
      - 'https:'
      - 'stats.beta.gouv.fr'
      - 'sentry.incubateur.net'
      - 'client.crisp.chat'
      - 'client.relay.crisp.chat'
    base-uri:
      - "'self'"
    object-src:
      - "'self'"
      - "blob:"
    script-src:
      - "'self'"
      - 'stats.beta.gouv.fr'
      - 'sentry.incubateur.net'
      - 'client.crisp.chat'
      - 'nonce(mij-script)'
    img-src:
      - "'self'"
      - "blob:"
      - 'data:'
    style-src:
      - "'self'"
      - 'client.crisp.chat'
      - "'unsafe-inline'"
    connect-src:
      - "'self'"
      - 'data:'
      - 'https:'
      - 'stats.beta.gouv.fr'
      - 'sentry.incubateur.net'
      - 'client.crisp.chat'
      - 'client.relay.crisp.chat'
      - 'wss:'


# For different set-ups in the dev environment
when@dev:
  opctim_csp_bundle:
    # always_add: []

    directives:
    # Add your directive overrides here
